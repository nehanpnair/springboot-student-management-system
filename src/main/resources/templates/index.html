<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Student Management System</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: #eef4ff;
    margin:0;
    padding:40px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#1e3a8a;
}

h2{
    color:#2563eb;
}

form{
    margin-bottom:30px;
}

input{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #cbd5e1;
    border-radius:5px;
}

button{
    background-color:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}

button:hover{
    background-color:#1e40af;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background-color:#2563eb;
    color:white;
    padding:10px;
}

td{
    padding:8px;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background-color:#f1f5ff;
}

</style>

</head>

<body>

<div class="container">

<h1>Student Management System</h1>

<h2>Student Registration</h2>
<p th:if="${error}" 
style="background:#fee2e2; color:#b91c1c; padding:10px; border-radius:5px;"
th:text="${error}">
</p>
<form action="/api/students" method="post">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Course</label>
<input type="text" name="course" required>

<button type="submit">Add Student</button>

</form>

<h2>Student List</h2>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Course</th>
</tr>

<tr th:each="student : ${students}">
<td th:text="${student.id}"></td>
<td th:text="${student.name}"></td>
<td th:text="${student.email}"></td>
<td th:text="${student.course}"></td>
</tr>

</table>

</div>

</body>
</html>
